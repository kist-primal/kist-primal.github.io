positions:
  - title: "Ph.D. / M.S. Student — Robot Manipulation"
    description: "We seek motivated graduate students to work on dexterous manipulation, tactile sensing, and contact-rich robot control at KIST/UST."
    requirements:
      - "Background in robotics, mechanical engineering, or computer science"
      - "Proficiency in C++ and/or Python"
      - "Experience with ROS/ROS2 and real robot platforms preferred"
    open: true

  - title: "Ph.D. Student — Embodied AI"
    description: "Join our team to develop learning algorithms for robots that acquire physical skills through interaction, imitation, and language grounding."
    requirements:
      - "Strong background in machine learning or reinforcement learning"
      - "Familiarity with PyTorch and deep learning frameworks"
      - "Prior research experience (publications a plus)"
    open: true

  - title: "Research Intern — Physical Perception"
    description: "Summer internship for undergraduate or master's students to contribute to multi-modal 3D perception research for robotic manipulation."
    requirements:
      - "Enrolled in a BS/MS program in CS, EE, ME, or related field"
      - "Familiarity with point cloud processing or computer vision"
      - "Enthusiasm for hands-on robotics research"
    open: true
