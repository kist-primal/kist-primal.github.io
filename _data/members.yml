pi:
  - name: Prof. Minjun Kim
    name_ko: 김민준
    role: Principal Investigator
    emoji: "👨‍🔬"
    image: # /assets/img/members/pi.jpg
    email: minjun@kaist.ac.kr
    scholar: https://scholar.google.com/
    website: https://kist-primal.github.io/
    bio: >
      Prof. Minjun Kim leads the Autonomous Robotics & Intelligence (ARI) Lab at KAIST
      School of Computing. His research focuses on autonomous navigation, multi-robot
      coordination, and 3D scene understanding for real-world robotic systems.
    research_interests:
      - Autonomous Navigation & SLAM
      - Multi-Robot Systems
      - 3D Scene Understanding
      - Edge AI for Robotics
    education:
      - degree: Ph.D. in Computer Science
        institution: Carnegie Mellon University
        year: "2015"
      - degree: B.S. in Electrical Engineering
        institution: KAIST
        year: "2010"
    career:
      - title: Assistant Professor
        institution: KAIST School of Computing
        period: "2018 – Present"
      - title: Postdoctoral Researcher
        institution: MIT CSAIL
        period: "2015 – 2018"
    awards:
      - "Best Paper Award, IROS 2024"
      - "Outstanding Reviewer, ICRA 2023"
      - "NRF Young Researcher Award, 2021"

