pi:
  - name: Prof. Minjun Kim
    name_ko: 김민준
    role: Principal Investigator
    image: # /assets/img/members/pi.jpg
    email: minjun@kist.re.kr
    scholar: https://scholar.google.com/
    website: https://kist-primal.github.io/
    bio: >
      Prof. Minjun Kim leads the Physical Intelligence & Embodied Robotics (PIER) Lab at KIST
      (Korea Institute of Science and Technology). His research focuses on robot manipulation,
      embodied AI, and multi-modal perception for real-world robotic systems that physically
      interact with complex environments.
    research_interests:
      - Robot Manipulation & Dexterous Grasping
      - Embodied AI & Learning from Interaction
      - Physical Perception & Sensor Fusion
      - Sim-to-Real Transfer
    education:
      - degree: Ph.D. in Computer Science
        institution: Carnegie Mellon University
        year: "2015"
      - degree: B.S. in Electrical Engineering
        institution: Seoul National University
        year: "2010"
    career:
      - title: Principal Researcher
        institution: KIST (Korea Institute of Science and Technology)
        period: "2018 – Present"
      - title: Postdoctoral Researcher
        institution: MIT CSAIL
        period: "2015 – 2018"
    awards:
      - "Best Paper Award, IROS 2024"
      - "Outstanding Reviewer, ICRA 2023"
      - "NRF Young Researcher Award, 2021"

