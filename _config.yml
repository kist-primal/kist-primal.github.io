# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: ARI Lab # 연구실 약칭 (네비게이션 바에 표시)
first_name: Autonomous Robotics &
middle_name:
last_name: Intelligence Laboratory
email: ari-lab@kaist.ac.kr
description: >
  We build intelligent robots that perceive, reason, and act in complex real-world environments.
footer_text: >
  © 2025 Autonomous Robotics & Intelligence Laboratory, KAIST
keywords: robotics, autonomous-systems, KAIST, research-lab

url: https://your-github-username.github.io  # ← 본인 GitHub username으로 변경
baseurl: # blank for user/org sites
last_updated: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

nav_order: [about, research, publications, people, contact]

# 네비게이션 스타일
navbar_fixed: true
footer_fixed: false

# 다크모드 토글
enable_darkmode: false

# 아이콘 & 프로필 이미지
enable_project_categories: true
enable_medium_zoom: true
enable_progressbar: true

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: your-github-username  # ← 변경
scholar_userid:                        # ← Google Scholar ID
# twitter_username:
# linkedin_username:

# -----------------------------------------------------------------------------
# Blog (비활성화 - 연구실 사이트에선 불필요할 수 있음)
# -----------------------------------------------------------------------------

blog_enabled: false
blog_name: News
blog_description:

# -----------------------------------------------------------------------------
# Collections (핵심!)
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

# 뉴스 설정
announcements:
  enabled: true
  scrollable: true
  limit: 5
  
# -----------------------------------------------------------------------------
# Publications (BibTeX 자동 파싱)
# -----------------------------------------------------------------------------

publications:
  date_format: "%Y"
  group_by_year: true
  group_order: descending

# Scholar 설정
scholar:
  last_name: [Kim]          # ← PI 성으로 변경 (논문에서 볼드 처리됨)
  first_name: [Minjun]      # ← PI 이름으로 변경

filtered_bibtex_keywords:
  [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website, preview, altmetric, dimensions]

enable_publication_badges:
  altmetric_badge: false
  dimensions_badge: false

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  math_engine: mathjax

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# 기타
# -----------------------------------------------------------------------------

enable_google_analytics: false
enable_cronitor_analytics: false
enable_google_verification: false
enable_bing_verification: false
enable_masonry: true
enable_math: true
enable_tooltips: true
enable_navbar_social: false
